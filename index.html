<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- ANTI CACHE ULTIMATE -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script>
        const APP_VERSION = '3.0.1';
        let savedVersion = localStorage.getItem('kbc_app_version');
        if (savedVersion !== APP_VERSION) {
            localStorage.setItem('kbc_app_version', APP_VERSION);
            if ('caches' in window) {
                caches.keys().then(keys => keys.forEach(key => caches.delete(key)));
            }
            setTimeout(() => location.reload(true), 100);
        }
    </script>
    
    <title>KBC Raport Generator - Fixed Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        * { -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at 0% 0%, #f4fbf7 0%, #f1f5f9 100%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #059669 0%, #0d9488 100%);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            background: #1e293b;
            color: white;
        }
        
        .toast.success { background: #059669; }
        .toast.error { background: #dc2626; }
        .toast.warning { background: #d97706; }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .test-mode-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            z-index: 999;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased text-slate-800">

    <div class="test-mode-badge" id="statusBadge">
        🟢 Online | v3.0.1
    </div>

    <div class="container mx-auto px-4 py-8 max-w-4xl flex-1 flex flex-col justify-center">
        <div class="text-center mb-6">
            <div class="inline-flex items-center gap-2 bg-emerald-500/10 text-emerald-800 px-3.5 py-1.5 rounded-full text-[11px] font-bold border border-emerald-500/20 mb-3">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                FIXED VERSION • DIRECT API CALL
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight bg-gradient-to-r from-slate-900 via-emerald-800 to-slate-900 bg-clip-text text-transparent">KBC Raport Generator AI</h1>
            <p class="text-slate-500 text-xs font-semibold mt-1">Versi terbaru dengan koneksi AI yang lebih stabil</p>
        </div>

        <div class="glass-panel rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            
            <div class="p-4 bg-amber-500/5 border-b border-slate-200">
                <label class="block text-[10px] font-extrabold text-amber-700 uppercase tracking-widest mb-2">🔑 Google AI Studio API Key</label>
                <input type="password" id="apiKeyInput" placeholder="Masukkan API Key Anda..." class="w-full bg-white border border-slate-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-amber-500">
                <div class="flex justify-between mt-2">
                    <p class="text-[10px] text-slate-400">💡 Dapatkan di <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-emerald-600 underline">Google AI Studio</a></p>
                    <button onclick="testApiKey()" class="text-[10px] bg-slate-100 px-3 py-1 rounded-lg hover:bg-slate-200">🔍 Test Key</button>
                </div>
            </div>

            <div class="p-6 border-b border-slate-200 bg-white/40">
                <label class="block text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2">📚 Materi Pokok</label>
                <input type="text" id="materiInput" placeholder="Contoh: mengidentifikasi keragaman suku dan budaya Indonesia" class="w-full bg-white border border-slate-200 rounded-2xl px-4 py-4 text-slate-800 font-bold text-sm shadow-inner focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10">
            </div>

            <div class="p-4 border-b border-slate-200 bg-white/50 text-center">
                <button onclick="generateRaport()" id="btnGenerate" class="w-full btn-gradient text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer text-sm flex items-center justify-center gap-2">
                    🚀 Generate 3 Opsi Kalimat Raport
                </button>
            </div>

            <div class="p-6 bg-slate-50/70 grid grid-cols-1 gap-6">
                <!-- Opsi 1 -->
                <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                    <div class="flex justify-between items-start gap-4 mb-3">
                        <div class="flex flex-wrap gap-1.5" id="tagsA">
                            <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md">🌿 Menunggu</span>
                        </div>
                        <button onclick="copyText('outA', this)" class="text-[11px] bg-slate-100 border border-slate-200 hover:bg-slate-200 px-3 py-1.5 rounded-xl">📋 Salin</button>
                    </div>
                    <div id="outA" class="text-slate-800 font-medium text-sm leading-relaxed min-h-[60px] p-2 bg-slate-50 rounded-xl text-slate-400 italic">
                        Klik Generate untuk memulai
                    </div>
                </div>

                <!-- Opsi 2 -->
                <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                    <div class="flex justify-between items-start gap-4 mb-3">
                        <div class="flex flex-wrap gap-1.5" id="tagsB">
                            <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md">🌿 Menunggu</span>
                        </div>
                        <button onclick="copyText('outB', this)" class="text-[11px] bg-slate-100 border border-slate-200 hover:bg-slate-200 px-3 py-1.5 rounded-xl">📋 Salin</button>
                    </div>
                    <div id="outB" class="text-slate-800 font-medium text-sm leading-relaxed min-h-[60px] p-2 bg-slate-50 rounded-xl text-slate-400 italic">
                        Klik Generate untuk memulai
                    </div>
                </div>

                <!-- Opsi 3 -->
                <div class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                    <div class="flex justify-between items-start gap-4 mb-3">
                        <div class="flex flex-wrap gap-1.5" id="tagsC">
                            <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md">🌿 Menunggu</span>
                        </div>
                        <button onclick="copyText('outC', this)" class="text-[11px] bg-slate-100 border border-slate-200 hover:bg-slate-200 px-3 py-1.5 rounded-xl">📋 Salin</button>
                    </div>
                    <div id="outC" class="text-slate-800 font-medium text-sm leading-relaxed min-h-[60px] p-2 bg-slate-50 rounded-xl text-slate-400 italic">
                        Klik Generate untuk memulai
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load saved API key
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) {
            document.getElementById('apiKeyInput').value = savedKey;
        }
        
        document.getElementById('apiKeyInput').addEventListener('input', (e) => {
            localStorage.setItem('gemini_api_key', e.target.value.trim());
        });
        
        document.getElementById('materiInput').value = 'mengidentifikasi keragaman suku dan budaya Indonesia';
        
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = type === 'error' ? `❌ ${message}` : type === 'success' ? `✅ ${message}` : `ℹ️ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Test API Key function
        async function testApiKey() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) {
                showToast('Masukkan API Key dulu!', 'error');
                return;
            }
            
            showToast('Menguji API Key...', 'info');
            document.getElementById('statusBadge').innerHTML = '🟡 Testing API...';
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                if (response.ok) {
                    showToast('API Key VALID! Silakan generate raport.', 'success');
                    document.getElementById('statusBadge').innerHTML = '🟢 API Key OK | v3.0.1';
                } else {
                    showToast('API Key INVALID! Periksa kembali.', 'error');
                    document.getElementById('statusBadge').innerHTML = '🔴 API Key Invalid | v3.0.1';
                }
            } catch (err) {
                showToast('Gagal konek ke server. Cek internet!', 'error');
                document.getElementById('statusBadge').innerHTML = '⚠️ Connection Error';
            }
        }
        
        async function generateRaport() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const materi = document.getElementById('materiInput').value.trim();
            const btn = document.getElementById('btnGenerate');
            
            if (!apiKey) {
                showToast('Masukkan API Key terlebih dahulu!', 'error');
                return;
            }
            if (!materi) {
                showToast('Masukkan materi pelajaran!', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Menghubungi AI...';
            document.getElementById('statusBadge').innerHTML = '🟡 Generating...';
            
            const prompt = `Anda adalah guru profesional. Buat 3 opsi kalimat rapor KBC untuk materi: "${materi}"

ATURAN:
1. Setiap kalimat HARUS dimulai dengan Kata Kerja Operasional (Menjelaskan, Menganalisis, Mempraktikkan, dll)
2. Hanya 1 titik di akhir kalimat, TIDAK boleh ada titik di tengah
3. Setiap opsi punya kombinasi Panca Cinta dan Dimensi yang berbeda

Output format JSON EXACT (tanpa teks lain):
{"opsiA":{"pancaCinta":"nama panca cinta","dimensi":"nama dimensi","kalimat":"kalimat option A"},"opsiB":{"pancaCinta":"nama panca cinta","dimensi":"nama dimensi","kalimat":"kalimat option B"},"opsiC":{"pancaCinta":"nama panca cinta","dimensi":"nama dimensi","kalimat":"kalimat option C"}}`;

            try {
                // Direct API call (no proxy needed for Gemini)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.8, responseMimeType: "application/json" }
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
                    let jsonText = data.candidates[0].content.parts[0].text;
                    jsonText = jsonText.replace(/```json\s*|\s*```/g, '').trim();
                    const result = JSON.parse(jsonText);
                    
                    // Update UI
                    document.getElementById('tagsA').innerHTML = `<span class="text-[10px] bg-emerald-50 text-emerald-700 font-bold px-2 py-0.5 rounded-md">🌿 ${result.opsiA.pancaCinta}</span><span class="text-[10px] bg-indigo-50 text-indigo-700 font-bold px-2 py-0.5 rounded-md">⭐ ${result.opsiA.dimensi}</span>`;
                    document.getElementById('tagsB').innerHTML = `<span class="text-[10px] bg-emerald-50 text-emerald-700 font-bold px-2 py-0.5 rounded-md">🌿 ${result.opsiB.pancaCinta}</span><span class="text-[10px] bg-indigo-50 text-indigo-700 font-bold px-2 py-0.5 rounded-md">⭐ ${result.opsiB.dimensi}</span>`;
                    document.getElementById('tagsC').innerHTML = `<span class="text-[10px] bg-emerald-50 text-emerald-700 font-bold px-2 py-0.5 rounded-md">🌿 ${result.opsiC.pancaCinta}</span><span class="text-[10px] bg-indigo-50 text-indigo-700 font-bold px-2 py-0.5 rounded-md">⭐ ${result.opsiC.dimensi}</span>`;
                    
                    document.getElementById('outA').innerHTML = result.opsiA.kalimat;
                    document.getElementById('outB').innerHTML = result.opsiB.kalimat;
                    document.getElementById('outC').innerHTML = result.opsiC.kalimat;
                    
                    showToast('Berhasil generate 3 opsi raport!', 'success');
                    document.getElementById('statusBadge').innerHTML = '🟢 Success | v3.0.1';
                } else {
                    throw new Error('Response format tidak sesuai');
                }
            } catch (err) {
                console.error('Error:', err);
                let errorMsg = err.message;
                if (errorMsg.includes('API key')) {
                    errorMsg = 'API Key tidak valid! Periksa kembali.';
                } else if (errorMsg.includes('quota')) {
                    errorMsg = 'Kuota API habis. Coba besok atau ganti key.';
                } else if (errorMsg.includes('network')) {
                    errorMsg = 'Koneksi bermasalah. Cek internet!';
                }
                showToast(errorMsg, 'error');
                document.getElementById('statusBadge').innerHTML = '🔴 Error: ' + errorMsg.slice(0, 20);
                
                document.getElementById('outA').innerHTML = `❌ Error: ${errorMsg}`;
                document.getElementById('outB').innerHTML = `❌ Silakan coba lagi nanti`;
                document.getElementById('outC').innerHTML = `❌ Pastikan API Key valid`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 Generate 3 Opsi Kalimat Raport';
            }
        }
        
        async function copyText(elementId, btn) {
            const text = document.getElementById(elementId).innerText;
            if (!text || text.includes('Klik Generate') || text.includes('Error') || text.includes('Menunggu')) {
                showToast('Tidak ada teks untuk disalin!', 'error');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(text);
                const originalText = btn.innerHTML;
                btn.innerHTML = '✅ Tersalin!';
                btn.classList.add('bg-emerald-600', 'text-white');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('bg-emerald-600', 'text-white');
                }, 2000);
                showToast('Teks berhasil disalin!', 'success');
            } catch (err) {
                showToast('Gagal menyalin teks', 'error');
            }
        }
    </script>
</body>
</html>
